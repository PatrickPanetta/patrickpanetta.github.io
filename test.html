<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patrick Panetta</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Center the content vertically and horizontally */
        body {
            background-color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Courier New", Courier, monospace;
        }

        /* Container for the links */
        nav {
            text-align: left;
            /* Adjust width for different screen shapes */
            width: 90%;
            max-width: 600px;
        }

        /* Style the links */
        a {
            display: block;
            color: black;
            text-decoration: none;
            font-size: 1.5rem;
            line-height: 2; /* Vertical spacing between lines */
            transition: opacity 0.2s;
        }

        /* Hover effect */
        a:hover {
            opacity: 0.5;
        }

        /* Mobile specific adjustments (Portrait) */
        @media (max-width: 480px) {
            a {
                font-size: 1.2rem;
                line-height: 3; /* More space for thumb-tapping on mobile */
            }
        }
    </style>
</head>
